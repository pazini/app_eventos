services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: app-eventos:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      QUEUE_CONNECTION: database
    expose:
      - "8080"
    volumes:
      - app-storage:/var/www/html/storage/app

volumes:
  app-storage:
